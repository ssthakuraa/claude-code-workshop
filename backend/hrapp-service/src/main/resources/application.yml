spring:
  application:
    name: hr-enterprise-platform
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/hr_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${HR_DB_USER:hrapp}
    password: ${HR_DB_PASS:hrapp_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: false

  cache:
    type: caffeine

  messages:
    basename: messages
    encoding: UTF-8

server:
  port: 8080
  servlet:
    context-path: /

hr:
  jwt:
    secret: ${HR_JWT_SECRET:dev-secret-change-in-production-min-32-chars}
    expiration: 1800000        # 30 minutes
    refresh-expiration: 604800000  # 7 days
  security:
    cors-origins: http://localhost:5173
  cache:
    jobs-ttl: 3600             # 1 hour
    departments-ttl: 900       # 15 minutes
    regions-ttl: 3600
    user-prefs-ttl: 300        # 5 minutes

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /app/hr/api-docs
  swagger-ui:
    path: /app/hr/swagger-ui.html
